<script>
  document.addEventListener("DOMContentLoaded", () => {
    const current = location.pathname.split("/").pop(); // current file, e.g. "team.html"

    document.querySelectorAll(".nav-link").forEach(link => {
      const linkPage = link.getAttribute("href");

      if (linkPage === current || (current === "" && linkPage === "./")) {
        link.classList.add("active");
      }
    });
  });
  
</script>
<script>
    document.addEventListener("DOMContentLoaded", () => {

      // ✅ FULL RENDER
      renderPeople(teamData.team, "team-container");
      renderPeople(teamData.collaborators, "collaborators-container");
      renderPeople(teamData.former, "former-container");

      // ✅ FILTERED RENDER (by id)
      const selectedIds = [
        "chairikiourt",
        "michaliszervas",
        "helenatheodoropoulou"
      ];

      const filtered = teamData.team.filter(p =>
        selectedIds.includes(p.id)
      );

      renderPeople(filtered, "filtered-team");

    });
  </script>
